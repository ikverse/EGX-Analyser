services:
  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./storage:/app/storage"]
    depends_on: [db, redis]
  worker:
    build: .
    command: celery -A app.scheduler.tasks worker --loglevel=INFO
    env_file: .env
    volumes: ["./storage:/app/storage"]
    depends_on: [db, redis]
  beat:
    build: .
    command: celery -A app.scheduler.tasks beat --loglevel=INFO
    env_file: .env
    depends_on: [db, redis]
  dashboard:
    build: .
    command: streamlit run app/dashboard/app.py --server.address=0.0.0.0
    ports: ["8501:8501"]
    environment: ["API_URL=http://api:8000"]
    depends_on: [api]
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_intelligence
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  postgres_data:
