name: Publish desktop update

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install frontend and Python build dependencies
        shell: pwsh
        run: |
          npm install --prefix desktop
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e ".[dev]"
      - name: Restore the private update signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $signingKeyPath = Join-Path $env:RUNNER_TEMP 'egx-intelligence.key'
          [IO.File]::WriteAllText($signingKeyPath, $env:TAURI_SIGNING_PRIVATE_KEY_CONTENT)
          "TAURI_SIGNING_PRIVATE_KEY=$signingKeyPath" | Add-Content -Path $env:GITHUB_ENV
      - name: Build signed update artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: powershell -ExecutionPolicy Bypass -File scripts/build-desktop.ps1 -Release
      - name: Create update manifest
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          New-Item -ItemType Directory -Force release | Out-Null
          $installer = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis -Filter '*.exe' | Select-Object -First 1
          $safeInstaller = Join-Path $PWD "release/egx-intelligence-$version-x64-setup.exe"
          Copy-Item $installer.FullName $safeInstaller
          Copy-Item "$($installer.FullName).sig" "$safeInstaller.sig"
          powershell -ExecutionPolicy Bypass -File scripts/new-update-manifest.ps1 -Repository '${{ github.repository }}' -Version $version -ReleaseNotes 'See this release for changes.' -InstallerPath $safeInstaller
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/egx-intelligence-*-setup.exe
            release/egx-intelligence-*-setup.exe.sig
            release/latest.json
