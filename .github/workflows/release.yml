name: Publish desktop update

on:
  push:
    branches:
      - main

concurrency:
  group: desktop-release-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release_gate:
    runs-on: windows-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect an approved versioned release commit
        id: release
        shell: pwsh
        run: |
          $version = (Get-Content desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $tag = "v$version"
          $subject = git log -1 --pretty=%s
          $shouldRelease = $subject -like "${tag}:*"
          "version=$version" | Add-Content -Path $env:GITHUB_OUTPUT
          "tag=$tag" | Add-Content -Path $env:GITHUB_OUTPUT
          "should_release=$($shouldRelease.ToString().ToLowerInvariant())" | Add-Content -Path $env:GITHUB_OUTPUT
          if ($shouldRelease) {
            Write-Host "Release commit detected: $subject"
          } else {
            Write-Host "Skipping release. Use the commit format '$tag: description' after synchronizing every bundled version."
          }

  release:
    needs: release_gate
    if: needs.release_gate.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore npm download cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\npm-cache
          key: windows-npm-downloads-v2-${{ hashFiles('desktop/package-lock.json') }}
          restore-keys: |
            windows-npm-downloads-v2-
      - name: Restore pip download cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-downloads-v2-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            windows-pip-downloads-v2-
      - name: Restore Rust compilation cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: windows-rust-tauri-v2-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-rust-tauri-v2-
      - name: Verify release tag matches bundled version
        shell: pwsh
        run: |
          $tag = '${{ needs.release_gate.outputs.tag }}'
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH; received '$tag'."
          }
          $expected = $Matches.version
          $tauriVersion = (Get-Content desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $nodeVersion = (Get-Content desktop/package.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (Select-String -Path desktop/src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $pythonVersion = (Select-String -Path pyproject.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $apiVersion = (Select-String -Path app/main.py -Pattern 'version="([^"]+)"').Matches[0].Groups[1].Value
          $versions = @{ tauri = $tauriVersion; node = $nodeVersion; cargo = $cargoVersion; python = $pythonVersion; api = $apiVersion }
          $mismatches = $versions.GetEnumerator() | Where-Object { $_.Value -ne $expected }
          if ($mismatches) {
            $actual = ($versions.GetEnumerator() | ForEach-Object { "$($_.Key)=$($_.Value)" }) -join ', '
            throw "Release tag $tag requires every bundled version to be $expected. Found: $actual"
          }
      - name: Create or verify release tag
        shell: pwsh
        run: |
          $tag = '${{ needs.release_gate.outputs.tag }}'
          git fetch --tags --force
          $existingTagTarget = git rev-parse -q --verify "refs/tags/${tag}^{}"
          if ($LASTEXITCODE -eq 0) {
            if ($existingTagTarget -ne $env:GITHUB_SHA) {
              throw "Existing tag $tag points to $existingTagTarget instead of $env:GITHUB_SHA. Refusing to publish a mismatched release."
            }
            Write-Host "Release tag $tag already points to this commit."
          } else {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            $subject = git log -1 --pretty=%s
            git tag -a $tag -m $subject $env:GITHUB_SHA
            git push origin $tag
          }
      - name: Install frontend and Python build dependencies
        shell: pwsh
        run: |
          npm ci --prefix desktop
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e ".[dev]"
      - name: Restore the private update signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $signingKeyPath = Join-Path $env:RUNNER_TEMP 'egx-analyzer.key'
          [IO.File]::WriteAllText($signingKeyPath, $env:TAURI_SIGNING_PRIVATE_KEY_CONTENT)
          "TAURI_SIGNING_PRIVATE_KEY=$signingKeyPath" | Add-Content -Path $env:GITHUB_ENV
      - name: Build signed update artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: powershell -ExecutionPolicy Bypass -File scripts/build-desktop.ps1 -Release -SkipDependencyInstall
      - name: Create update manifest
        shell: pwsh
        run: |
          $version = '${{ needs.release_gate.outputs.version }}'
          New-Item -ItemType Directory -Force release | Out-Null
          $installer = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis -Filter '*.exe' | Select-Object -First 1
          $safeInstaller = Join-Path $PWD "release/egx-analyzer-$version-x64-setup.exe"
          Copy-Item $installer.FullName $safeInstaller
          Copy-Item "$($installer.FullName).sig" "$safeInstaller.sig"
          powershell -ExecutionPolicy Bypass -File scripts/new-update-manifest.ps1 -Repository '${{ github.repository }}' -Version $version -ReleaseNotes 'See this release for changes.' -InstallerPath $safeInstaller
      - name: Read descriptive release title
        id: release_title
        shell: pwsh
        run: |
          $title = git log -1 --pretty=%s
          if (-not $title) { $title = "EGX Analyzer ${{ needs.release_gate.outputs.tag }}" }
          "title=$title" | Add-Content -Path $env:GITHUB_OUTPUT
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_gate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_title.outputs.title }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/egx-analyzer-*-setup.exe
            release/egx-analyzer-*-setup.exe.sig
            release/latest.json
