name: Publish desktop update

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install frontend and Python build dependencies
        shell: pwsh
        run: |
          npm install --prefix desktop
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e ".[dev]"
      - name: Restore the private update signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $signingKeyPath = Join-Path $env:RUNNER_TEMP 'egx-analyzer.key'
          [IO.File]::WriteAllText($signingKeyPath, $env:TAURI_SIGNING_PRIVATE_KEY_CONTENT)
          "TAURI_SIGNING_PRIVATE_KEY=$signingKeyPath" | Add-Content -Path $env:GITHUB_ENV
      - name: Verify update signing key matches the app public key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $configuredPublicKey = (Get-Content desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).plugins.updater.pubkey
          if (-not $configuredPublicKey) { throw "The updater public key is missing from desktop/src-tauri/tauri.conf.json." }
          $probePath = Join-Path $env:RUNNER_TEMP 'egx-updater-key-check.txt'
          $tauriCli = Join-Path $PWD 'desktop\node_modules\.bin\tauri.cmd'
          if (-not (Test-Path $tauriCli)) { throw "The local Tauri CLI was not installed at $tauriCli." }
          Set-Content -Path $probePath -Value 'EGX Analyzer updater signing-key verification' -NoNewline
          try {
            & $tauriCli signer sign --private-key $env:TAURI_SIGNING_PRIVATE_KEY $probePath
            if ($LASTEXITCODE -ne 0) { throw "Could not sign the updater verification probe. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD." }
            & $tauriCli signer verify $probePath $configuredPublicKey
            if ($LASTEXITCODE -ne 0) { throw "The GitHub TAURI_SIGNING_PRIVATE_KEY secret does not match the updater public key embedded in the app. Restore the original egx-intelligence.key secret; do not rotate the updater key." }
          } finally {
            Remove-Item $probePath, "$probePath.sig" -Force -ErrorAction SilentlyContinue
          }
      - name: Build signed update artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: powershell -ExecutionPolicy Bypass -File scripts/build-desktop.ps1 -Release
      - name: Create update manifest
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          New-Item -ItemType Directory -Force release | Out-Null
          $installer = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis -Filter '*.exe' | Select-Object -First 1
          $safeInstaller = Join-Path $PWD "release/egx-analyzer-$version-x64-setup.exe"
          Copy-Item $installer.FullName $safeInstaller
          Copy-Item "$($installer.FullName).sig" "$safeInstaller.sig"
          powershell -ExecutionPolicy Bypass -File scripts/new-update-manifest.ps1 -Repository '${{ github.repository }}' -Version $version -ReleaseNotes 'See this release for changes.' -InstallerPath $safeInstaller
      - name: Read descriptive release title
        id: release_title
        shell: pwsh
        run: |
          $title = git tag -l $env:GITHUB_REF_NAME --format="%(contents:subject)"
          if (-not $title) { $title = "EGX Analyzer $env:GITHUB_REF_NAME" }
          "title=$title" | Add-Content -Path $env:GITHUB_OUTPUT
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_title.outputs.title }}
          generate_release_notes: true
          files: |
            release/egx-analyzer-*-setup.exe
            release/egx-analyzer-*-setup.exe.sig
            release/latest.json
