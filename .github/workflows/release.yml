name: Publish desktop update

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}\\egx-intelligence.key
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install frontend and Python build dependencies
        shell: pwsh
        run: |
          npm install --prefix desktop
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Restore the private update signing key
        shell: pwsh
        run: |
          [IO.File]::WriteAllText($env:TAURI_SIGNING_PRIVATE_KEY, '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}')
      - name: Build signed update artifacts
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build-desktop.ps1 -Release
      - name: Create update manifest
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          powershell -ExecutionPolicy Bypass -File scripts/new-update-manifest.ps1 -Repository '${{ github.repository }}' -Version $version -ReleaseNotes 'See this release for changes.'
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            release/latest.json
